name: Build and Archive Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Commit
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle' # Automatically caches gradle dependencies

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and Test
        # 'build' runs 'check' (tests) and creates the jar files
        run: ./gradlew build

      - name: Upload Mod Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Mod-Jar
          # This path targets the default Gradle output folder for jars. 
          # It uses a wildcard to grab the compiled mod but ignore the '-sources' or '-dev' jars if they exist.
          path: build/libs/!(*-sources|*-dev|*-shadow).jar
          if-no-files-found: error
          
