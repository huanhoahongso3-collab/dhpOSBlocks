name: Build and Archive Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  gradle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Commit
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        # 'build' includes 'check' (tests) and 'assemble' (jar creation)
        run: ./gradlew build

      - name: List Build Artifacts (Debug)
        # This helps you see the exact filenames if the upload fails
        run: ls -R build/libs/

      - name: Upload Mod Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-mod
          # This pattern includes all jars but excludes common metadata/dev jars
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
            !build/libs/*-dev.jar
            !build/libs/*-shadow.jar
            !build/libs/*-api.jar
          if-no-files-found: error
          
